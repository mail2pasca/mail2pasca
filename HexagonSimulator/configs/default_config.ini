[simulation]
# UMa, UMi, SmA
scenario = UMa
# Carrier frequency in GHz
frequency_ghz = 2.0
# System bandwidth in MHz
bandwidth_mhz = 10
# Total simulation duration in milliseconds
simulation_duration_ms = 1000
# Simulation time step in milliseconds
time_step_ms = 1
# Number of User Equipments (UEs) to be dropped in the simulation
num_ues = 10

[traffic]
# Type of traffic model: FullBuffer, FTPModel3, XRModel
model = FullBuffer
# Parameters for FTPModel3
ftp_file_size_bytes = 500000
ftp_mean_inter_arrival_ms = 50
# Parameters for XRModel
xr_fps = 60
xr_packet_size_mean_bytes = 10000

[scheduler]
# Type of scheduler: RoundRobin, ProportionalFair
type = RoundRobin
# Smoothing factor for ProportionalFair scheduler's EWMA (0 < alpha <= 1)
pf_alpha = 0.1

[mimo]
# Number of antennas at the gNB (Base Station)
num_bs_antennas = 4
# Number of antennas at the UE
num_ue_antennas = 2

[network]
# Number of Base Stations (BSs) in the layout (e.g., 7 for a central cell with one tier)
num_base_stations = 7
# Inter-site distance in meters
inter_site_distance_m = 500
# Base Station antenna height in meters
bs_height_m = 25
# User Equipment antenna height in meters
ue_height_m = 1.5
# Base Station transmission power in dBm
bs_tx_power_dbm = 46

[channel]
# Shadowing standard deviation in dB
shadowing_std_dev_db = 8.0
# UE noise figure in dB
noise_figure_db = 5.0

[output]
# Logging level (e.g., DEBUG, INFO, WARNING, ERROR)
log_level = INFO
# File to save the simulation results
results_file = simulation_results.json
